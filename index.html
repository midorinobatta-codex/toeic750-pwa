<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TOEIC 750 学習アプリ</title>
  
  <!-- PWA Settings -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Icons (Material Symbols Outlined) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
  <!-- App Container -->
  <div id="app-container">
    
    <!-- Top Header -->
    <header class="app-header">
      <h1 id="header-title">Home</h1>
      <button id="btn-settings" class="icon-btn" aria-label="Settings">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </header>

    <!-- Main Content Area (SPA views) -->
    <main id="main-content">
      
      <!-- Home View -->
      <section id="view-home" class="view active">
        <div class="view-header">
          <h2>Today's Plan</h2>
          <span class="badge day-badge">Day <span id="home-day">1</span>/60</span>
        </div>
        <div id="home-tasks" class="task-list">
          <!-- Tasks injected via JS -->
        </div>
        <div class="dashboard-shortcut card" id="card-dashboard">
          <div class="card-content">
            <h3>成長ダッシュボード</h3>
            <p>現在の推定スコアや弱点を確認</p>
          </div>
          <span class="material-symbols-outlined">analytics</span>
        </div>
      </section>

      <!-- Vocabulary View -->
      <section id="view-vocabulary" class="view">
        <div class="view-header">
          <h2>Vocabulary</h2>
          <span class="badge highlight-violet">単語</span>
        </div>
        <!-- To be implemented in vocabulary.js -->
        <div id="vocab-container" class="module-container"></div>
      </section>

      <!-- Grammar View -->
      <section id="view-grammar" class="view">
        <div class="view-header">
          <h2>Grammar</h2>
          <span class="badge highlight-blue">文法</span>
        </div>
        <div id="grammar-container" class="module-container"></div>
      </section>

      <!-- Listening View -->
      <section id="view-listening" class="view">
        <div class="view-header">
          <h2>Listening</h2>
          <span class="badge highlight-emerald">リスニング</span>
        </div>
        <div id="listening-container" class="module-container"></div>
      </section>

      <!-- Reading View -->
      <section id="view-reading" class="view">
        <div class="view-header">
          <h2>Reading</h2>
          <span class="badge highlight-amber">リーディング</span>
        </div>
        <div id="reading-container" class="module-container"></div>
      </section>

      <!-- Practice View -->
      <section id="view-practice" class="view">
        <div class="view-header">
          <h2>Practice tests</h2>
          <span class="badge highlight-ruby">実践演習</span>
        </div>
        <div id="practice-container" class="module-container"></div>
      </section>

      <!-- Dashboard View -->
      <section id="view-dashboard" class="view">
        <div class="view-header">
          <h2>Dashboard</h2>
        </div>
        <div id="dashboard-container" class="module-container">
          <p>Chart.js visualization goes here.</p>
        </div>
      </section>

      <!-- Settings View -->
      <section id="view-settings" class="view">
        <div class="view-header">
          <h2>Settings</h2>
        </div>
        <div id="settings-container" class="module-container"></div>
      </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-target="view-home">
        <span class="material-symbols-outlined">home</span>
        <span>Home</span>
      </button>
      <button class="nav-item" data-target="view-vocabulary">
        <span class="material-symbols-outlined">text_fields</span>
        <span>Vocab</span>
      </button>
      <button class="nav-item" data-target="view-grammar">
        <span class="material-symbols-outlined">spellcheck</span>
        <span>Grammar</span>
      </button>
      <button class="nav-item" data-target="view-listening">
        <span class="material-symbols-outlined">headphones</span>
        <span>Listen</span>
      </button>
      <button class="nav-item" data-target="view-reading">
        <span class="material-symbols-outlined">menu_book</span>
        <span>Read</span>
      </button>
      <button class="nav-item" data-target="view-practice">
        <span class="material-symbols-outlined">fact_check</span>
        <span>Test</span>
      </button>
    </nav>
  </div>

  <!-- Scripts -->
  <script src="lib/chart.min.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
